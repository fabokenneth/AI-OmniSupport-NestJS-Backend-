version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: omnisupport_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-omnisupport}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-omnisupport_password}
      POSTGRES_DB: ${DB_NAME:-omnisupport}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-omnisupport}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
